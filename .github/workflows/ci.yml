name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Set up Python
        run: uv python install 3.12
      
      - name: Install dependencies
        run: uv sync --group dev
      
      - name: Run tests (mock cube only)
        run: |
          # Skip tests that require pywin32 (Windows-only)
          # Run mock cube and other platform-independent tests
          uv run pytest tests/test_mock_cube.py tests/test_config.py tests/test_connections.py -v
      
      - name: Check import works
        run: |
          uv run python -c "from dax_query_mcp.mock_cube import ContosoCube; print(f'Mock cube has {len(ContosoCube().sales)} sales rows')"

  test-windows:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Set up Python
        run: uv python install 3.12
      
      - name: Install dependencies
        run: uv sync --group dev
      
      - name: Run all tests
        run: uv run pytest -v
      
      - name: Test mock connection end-to-end
        run: |
          uv run python -c "from dax_query_mcp.executor import dax_to_pandas; df = dax_to_pandas('EVALUATE Products', 'MOCK://contoso'); print(df)"

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Set up Python
        run: uv python install 3.12
      
      - name: Install dependencies
        run: uv sync --group dev
      
      - name: Check syntax
        run: uv run python -m py_compile dax_query_mcp/*.py
